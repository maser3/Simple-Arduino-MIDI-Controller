<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI CC Controller Config</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0e27;
            --bg-secondary: #12172a;
            --bg-tertiary: #1a1f3a;
            --accent-primary: #00d9ff;
            --accent-secondary: #6366f1;
            --accent-tertiary: #a78bfa;
            --text-primary: #f8f9fa;
            --text-secondary: #b0b9d4;
            --text-tertiary: #7c8aa2;
            --success: #10b981;
            --success-glow: #059669;
            --error: #ef4444;
            --border: #2a3153;
            --border-light: #3f4769;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            color: var(--text-primary);
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 217, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        .container {
            background: rgba(18, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 50px;
            max-width: 600px;
            width: 100%;
            position: relative;
            z-index: 1;
            box-shadow: 0 20px 60px rgba(0, 217, 255, 0.05), 0 0 120px rgba(99, 102, 241, 0.02);
            margin: 40px 0;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .connection-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            padding: 16px 20px;
            background: rgba(26, 31, 58, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .connection-status:hover {
            border-color: var(--border-light);
            background: rgba(26, 31, 58, 0.8);
        }

        .status-text {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-tertiary);
            transition: all 0.3s ease;
            box-shadow: 0 0 0 3px rgba(124, 138, 162, 0.1);
        }

        .status-dot.connected {
            background: var(--success);
            box-shadow: 0 0 12px var(--success), 0 0 24px rgba(16, 185, 129, 0.2);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 12px var(--success), 0 0 24px rgba(16, 185, 129, 0.2); }
            50% { box-shadow: 0 0 20px var(--success), 0 0 40px rgba(16, 185, 129, 0.4); }
        }

        .status-label {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }

        #portName {
            font-size: 12px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
        }

        button {
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
        }

        .btn-connect {
            flex: 1;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
            color: var(--bg-dark);
            font-weight: 700;
        }

        .btn-connect:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(99, 102, 241, 0.4), 0 0 24px rgba(0, 217, 255, 0.2);
        }

        .btn-connect:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-connect:disabled {
            background: var(--text-tertiary);
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-secondary {
            flex: 1;
            padding: 14px 24px;
            background: rgba(42, 49, 83, 0.5);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(42, 49, 83, 0.8);
            border-color: var(--border-light);
            transform: translateY(-2px);
        }

        .btn-secondary:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 4px;
            background: var(--accent-primary);
            border-radius: 50%;
        }

        .control-row {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 12px;
            margin-bottom: 14px;
            align-items: center;
            padding: 12px;
            background: rgba(26, 31, 58, 0.4);
            border: 1px solid var(--border);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .control-row:hover {
            border-color: var(--border-light);
            background: rgba(26, 31, 58, 0.6);
        }

        .input-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        input[type="number"] {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(10, 14, 39, 0.4);
            color: var(--accent-primary);
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        input[type="number"]::placeholder {
            color: var(--text-tertiary);
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: rgba(0, 217, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
        }

        input[type="number"]:disabled {
            background: rgba(10, 14, 39, 0.2);
            color: var(--text-tertiary);
            cursor: not-allowed;
        }

        .btn-set {
            padding: 10px 16px;
            background: rgba(163, 230, 53, 0.15);
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-set:hover:not(:disabled) {
            background: var(--accent-primary);
            color: var(--bg-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 217, 255, 0.3);
        }

        .btn-set:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-set:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .values-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .value-card {
            background: rgba(26, 31, 58, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            transition: all 0.18s ease;
        }

        .value-card:hover {
            border-color: var(--accent-primary);
            background: rgba(26, 31, 58, 0.8);
        }

        .value-card.value-updated {
            border-color: var(--success);
            box-shadow: 0 0 18px rgba(16, 185, 129, 0.35);
            transform: scale(1.03);
        }

        .value-label {
            font-size: 11px;
            color: var(--text-tertiary);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .value-display {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-primary);
            font-family: 'Monaco', 'Courier New', monospace;
        }

        .value-subtitle {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #output {
            background: rgba(10, 14, 39, 0.6);
            color: var(--accent-primary);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 10px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            height: 220px;
            overflow-y: auto;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        #output::-webkit-scrollbar {
            width: 6px;
        }

        #output::-webkit-scrollbar-track {
            background: transparent;
        }

        #output::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 3px;
        }

        #output::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }

        .output-line {
            margin-bottom: 4px;
            word-wrap: break-word;
            word-break: break-all;
        }

        .output-empty {
            color: var(--text-tertiary);
            font-style: italic;
            opacity: 0.6;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .btn-action {
            padding: 12px 16px;
            font-size: 12px;
            background: rgba(42, 49, 83, 0.5);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-action:hover:not(:disabled) {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--accent-secondary);
            color: var(--accent-secondary);
            transform: translateY(-2px);
        }

        .btn-action:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .info-box {
            background: rgba(0, 217, 255, 0.05);
            border: 1px solid var(--accent-primary);
            border-left: 3px solid var(--accent-primary);
            padding: 16px;
            border-radius: 10px;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .info-box strong {
            color: var(--accent-primary);
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            .container {
                padding: 30px 20px;
                margin: 20px 0;
            }

            h1 {
                font-size: 32px;
            }

            .button-group {
                flex-direction: column;
            }

            .control-row {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                grid-template-columns: 1fr;
            }

            .values-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎹 MIDI Control</h1>
            <p class="subtitle">Arduino MIDI Controller Configuration</p>
        </header>

        <div class="connection-status">
            <div class="status-text">
                <div class="status-dot" id="statusDot"></div>
                <div>
                    <span class="status-label" id="statusLabel">Disconnected</span>
                    <div style="font-size: 11px; color: var(--text-tertiary);" id="portName"></div>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-connect" id="connectBtn" onclick="connectSerial()">Connect Arduino</button>
            <button class="btn-secondary" id="disconnectBtn" onclick="disconnectSerial()" disabled>Disconnect</button>
        </div>

        <div class="section">
            <div class="section-title">Live MIDI Output Values</div>
            <div class="values-container" id="valuesContainer"></div>
        </div>

        <div class="section">
            <div class="section-title">MIDI CC Mapping</div>
            <div id="controlsContainer"></div>
        </div>

        <div class="section">
            <div class="section-title">Response Console</div>
            <div id="output"></div>
        </div>

        <div class="action-buttons">
            <button class="btn-action" id="statusBtn" onclick="sendStatus()" disabled>Get Status</button>
            <button class="btn-action" id="valuesBtn" onclick="sendValues()" disabled>Get Values</button>
            <button class="btn-action" id="resetBtn" onclick="sendReset()" disabled>Reset Defaults</button>
        </div>

        <div class="info-box">
            <strong>💡 Quick Start</strong>
            Connect your Arduino → Change a CC number or press Set → Move a physical control → Watch its MIDI value update from 0-127
        </div>
    </div>

    <script>
        let port = null;
        let reader = null;
        let isDisconnecting = false;
        let outputBuffer = '';
        const midiValues = [null, null, null, null, null, null];
        const ccNumbers = [20, 21, 22, 23, 24, 25];

        const controlsContainer = document.getElementById('controlsContainer');
        const valuesContainer = document.getElementById('valuesContainer');
        const output = document.getElementById('output');
        const statusDot = document.getElementById('statusDot');
        const statusLabel = document.getElementById('statusLabel');
        const portName = document.getElementById('portName');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const statusBtn = document.getElementById('statusBtn');
        const valuesBtn = document.getElementById('valuesBtn');
        const resetBtn = document.getElementById('resetBtn');

        const padLayout = [4, 5, 2, 3, 0, 1];

        padLayout.forEach(i => {
            const card = document.createElement('div');
            card.className = 'value-card';
            card.innerHTML = `
                <div class="value-label" id="label${i}">Input A${i}</div>
                <div class="value-display" id="val${i}">---</div>
                <div class="value-subtitle" id="ccLabel${i}">CC #${ccNumbers[i]}</div>
            `;
            valuesContainer.appendChild(card);
        });

        for (let i = 0; i < 6; i++) {
            const row = document.createElement('div');
            row.className = 'control-row';
            row.innerHTML = `
                <label class="input-label">Input ${i} (A${i}) CC #</label>
                <input type="number" id="cc${i}" min="0" max="127" value="${20 + i}" onchange="sendCC(${i})" onkeydown="handleCcKey(event, ${i})" disabled>
                <button class="btn-set" id="setBtn${i}" onclick="sendCC(${i})" disabled>Set</button>
            `;
            controlsContainer.appendChild(row);
        }

        addLog('Waiting for connection...');

        async function connectSerial() {
            try {
                if (!navigator.serial) {
                    throw new Error('Web Serial API is not supported in this browser');
                }

                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });
                isDisconnecting = false;

                updateConnectionStatus(true);
                addLog('✓ Connected to Arduino');

                setControlsEnabled(true);
                readSerial();

                setTimeout(() => sendStatus(), 500);
            } catch (error) {
                addLog(`✗ Connection failed: ${error.message}`, true);
                port = null;
                updateConnectionStatus(false);
                setControlsEnabled(false);
            }
        }

        async function disconnectSerial() {
            isDisconnecting = true;

            try {
                if (reader) {
                    await reader.cancel();
                }

                if (port) {
                    await port.close();
                }
            } catch (error) {
                addLog(`✗ Disconnect error: ${error.message}`, true);
            } finally {
                port = null;
                reader = null;
                outputBuffer = '';
                updateConnectionStatus(false);
                setControlsEnabled(false);
                resetValueDisplays();
                addLog('Disconnected from Arduino');
            }
        }

        async function readSerial() {
            if (!port || !port.readable || isDisconnecting) return;

            reader = port.readable.getReader();
            const decoder = new TextDecoder();

            try {
                while (!isDisconnecting) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    const text = decoder.decode(value, { stream: true });
                    outputBuffer += text;

                    const lines = outputBuffer.split(/\r?\n/);
                    outputBuffer = lines.pop();

                    lines.forEach(line => {
                        const trimmed = line.trim();
                        if (trimmed) {
                            addLog(trimmed);
                            parseMidiValues(trimmed);
                        }
                    });
                }
            } catch (error) {
                if (!isDisconnecting && error.name !== 'AbortError') {
                    addLog(`✗ Read error: ${error.message}`, true);
                }
            } finally {
                try {
                    reader.releaseLock();
                } catch (error) {
                    // Ignore lock-release errors during disconnect.
                }

                reader = null;

                if (port && !isDisconnecting) {
                    readSerial();
                }
            }
        }

        function parseMidiValues(line) {
            // Supported value formats from Arduino:
            // A0:64, A0=64, A0 64, MIDI:A3:88, CC:A4:12
            // CC20:64, CC 20 64
            // VALUES:64,32,0,127,80,90
            // 64,32,0,127,80,90
            //
            // Supported mapping/status formats from Arduino:
            // MAP:A0:20, MAP 0 20, SET:0:20

            parseCcMappings(line);

            let foundValue = false;

            const labelledRegex = /(?:MIDI|CC)?\s*:??\s*A([0-5])\s*[:=\s]+\s*(\d{1,3})/gi;
            let match;

            while ((match = labelledRegex.exec(line)) !== null) {
                const index = Number(match[1]);
                const value = clampMidiValue(Number(match[2]));
                updateMidiValueDisplay(index, value);
                foundValue = true;
            }

            const ccNumberRegex = /CC\s*#?\s*(\d{1,3})\s*[:=\s]+\s*(\d{1,3})/gi;
            while ((match = ccNumberRegex.exec(line)) !== null) {
                const ccNumber = Number(match[1]);
                const value = clampMidiValue(Number(match[2]));
                const index = ccNumbers.indexOf(ccNumber);

                if (index !== -1) {
                    updateMidiValueDisplay(index, value);
                    foundValue = true;
                }
            }

            if (foundValue) return;

            const compactLine = line.replace(/^VALUES\s*[:=]\s*/i, '').trim();
            if (/^\d{1,3}(\s*,\s*\d{1,3}){5}$/.test(compactLine)) {
                compactLine.split(',').forEach((part, index) => {
                    updateMidiValueDisplay(index, clampMidiValue(Number(part)));
                });
            }
        }

        function parseCcMappings(line) {
            const mapRegex = /(?:MAP|SET)\s*:?\s*A?([0-5])\s*[:=\s]+\s*(\d{1,3})/gi;
            let match;

            while ((match = mapRegex.exec(line)) !== null) {
                const index = Number(match[1]);
                const ccNumber = Number(match[2]);

                if (index >= 0 && index < 6 && ccNumber >= 0 && ccNumber <= 127) {
                    ccNumbers[index] = ccNumber;
                    const input = document.getElementById(`cc${index}`);
                    if (input) input.value = ccNumber;
                    updateCcLabel(index);
                }
            }
        }

        function clampMidiValue(value) {
            if (!Number.isFinite(value)) return 0;
            return Math.max(0, Math.min(127, Math.round(value)));
        }

        function updateMidiValueDisplay(index, value) {
            if (index < 0 || index >= 6) return;

            midiValues[index] = value;

            const element = document.getElementById(`val${index}`);
            if (!element) return;

            if (element.textContent === String(value)) return;

            element.textContent = value;

            const card = element.closest('.value-card');
            if (card) {
                card.classList.remove('value-updated');
                void card.offsetWidth;
                card.classList.add('value-updated');
                setTimeout(() => card.classList.remove('value-updated'), 180);
            }
        }

        async function sendCommand(cmd) {
            if (!port || !port.writable) {
                addLog('✗ Not connected', true);
                return;
            }

            const writer = port.writable.getWriter();
            try {
                await writer.write(new TextEncoder().encode(cmd + '\n'));
                addLog(`→ ${cmd}`);
            } catch (error) {
                addLog(`✗ Send error: ${error.message}`, true);
            } finally {
                writer.releaseLock();
            }
        }

        async function sendCC(channel) {
            const input = document.getElementById(`cc${channel}`);
            const ccValue = Number(input.value);

            if (!Number.isInteger(ccValue) || ccValue < 0 || ccValue > 127) {
                addLog('✗ CC number must be 0-127', true);
                input.focus();
                return;
            }

            ccNumbers[channel] = ccValue;
            updateCcLabel(channel);

            // Arduino should parse this exact command:
            // SET:<inputIndex>:<ccNumber>
            await sendCommand(`SET:${channel}:${ccValue}`);
        }

        function handleCcKey(event, channel) {
            if (event.key === 'Enter') {
                event.preventDefault();
                sendCC(channel);
            }
        }

        function updateCcLabel(channel) {
            const label = document.getElementById(`ccLabel${channel}`);
            if (label) {
                label.textContent = `CC #${ccNumbers[channel]}`;
            }
        }

        async function sendStatus() {
            await sendCommand('STATUS');
        }

        async function sendValues() {
            await sendCommand('VALUES');
        }

        async function sendReset() {
            if (confirm('Reset all CC numbers to defaults (20-25)?')) {
                await sendCommand('RESET');
            }
        }

        function updateConnectionStatus(connected) {
            if (connected) {
                statusDot.classList.add('connected');
                statusLabel.textContent = 'Connected';

                const info = port && typeof port.getInfo === 'function' ? port.getInfo() : {};
                const vendor = info.usbVendorId ? `VID ${info.usbVendorId}` : '';
                const product = info.usbProductId ? `PID ${info.usbProductId}` : '';
                portName.textContent = [vendor, product].filter(Boolean).join(' / ') || 'Serial device';
            } else {
                statusDot.classList.remove('connected');
                statusLabel.textContent = 'Disconnected';
                portName.textContent = '';
            }
        }

        function setControlsEnabled(enabled) {
            document.querySelectorAll('input[type="number"]').forEach(el => el.disabled = !enabled);
            document.querySelectorAll('.btn-set').forEach(el => el.disabled = !enabled);
            statusBtn.disabled = !enabled;
            valuesBtn.disabled = !enabled;
            resetBtn.disabled = !enabled;
            connectBtn.disabled = enabled;
            disconnectBtn.disabled = !enabled;
        }

        function resetValueDisplays() {
            for (let i = 0; i < 6; i++) {
                midiValues[i] = null;
                document.getElementById(`val${i}`).textContent = '---';
                updateCcLabel(i);
            }
        }

        function addLog(message, isError = false) {
            const timestamp = new Date().toLocaleTimeString();
            const line = document.createElement('div');
            line.className = 'output-line';
            if (isError) {
                line.style.color = '#ef4444';
            }
            line.textContent = `[${timestamp}] ${message}`;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;

            const lines = output.querySelectorAll('.output-line');
            if (lines.length > 100) {
                lines[0].remove();
            }
        }

        if (!navigator.serial) {
            addLog('✗ Web Serial API not supported in this browser', true);
            document.querySelectorAll('button').forEach(btn => btn.disabled = true);
            const infoBox = document.querySelector('.info-box');
            infoBox.innerHTML += '<br><br><strong>⚠️ Browser Support:</strong><br>Use Chrome, Edge, or Opera. Firefox and Safari will not work.';
        }
    </script>
</body>
</html>
